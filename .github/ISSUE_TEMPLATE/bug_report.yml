name: Bug Report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill out the fields below so we can reproduce and fix it quickly.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line description of the bug.
      placeholder: "e.g. Bet confirmation screen freezes after submitting on Firefox"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Smart contract
        - Frontend / UI
        - Faucet API
        - OG / share card API
        - CI / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Connect wallet on Sepolia
        2. Click "Encrypt & bet" with amount 100
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The bet should submit and show a success toast.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The screen freezes and no error is shown.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, wallet, Node version (for contract issues).
      placeholder: |
        - Browser: Chrome 126 / Firefox 128
        - Wallet: MetaMask 12.x
        - Network: Sepolia
        - Node: 22.x (for contract issues)

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on the latest commit of `main`.
          required: true
